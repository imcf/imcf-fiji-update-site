name: IMCF Fiji Assembly 🏗️

on:
  push:
    branches: [main, ga_assembly]
  workflow_dispatch:

jobs:
  assemble-fiji:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🖥️ Set platform variable
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            echo "PLATFORM=win64" >> $GITHUB_ENV
          else
            echo "PLATFORM=linux64" >> $GITHUB_ENV
          fi
          echo "Platform set to $PLATFORM"

      - name: 📦 Download Fiji package
        run: |
          curl https://downloads.imagej.net/fiji/latest/fiji-latest-${{ env.PLATFORM }}-jdk.zip -o ./fiji-${{ env.PLATFORM }}.zip

      - name: 📂 Extract Fiji package
        run: 7zip x fiji-${{ env.PLATFORM }}.zip

      - name: 🚚 Move extracted Fiji.app to platform directory
        run: |
          mv Fiji.app Fiji.app-${{ env.PLATFORM }}
          echo "✅ Extracted to Fiji.app-${{ env.PLATFORM }}"

      - name: 🛠️ Set Fiji command path
        shell: bash
        run: |
          FIJI_DIR="Fiji.app-${{ env.PLATFORM }}"
          FIJI_CMD="./${FIJI_DIR}/ImageJ-${{ env.PLATFORM }}"
          if [ "${{ env.PLATFORM }}" = "win64" ]; then
            FIJI_CMD="$FIJI_CMD.exe"
          fi
          echo "FIJI_CMD=$FIJI_CMD" >> $GITHUB_ENV
          echo "Fiji command set to $FIJI_CMD"

      - name: 🛠️ Add required update sites
        shell: bash
        run: |
          echo "Adding update sites using $FIJI_CMD"
          set -x
          $FIJI_CMD --ij2 --headless --console --run "add-update-sites.py" sites_collection='update-sites-all.json'
          set +x

      - name: 🔄 Run Fiji updater
        shell: bash
        run: |
          echo "Running Fiji updater..."
          $FIJI_CMD --console --update update
          $FIJI_CMD --console --update update
          $FIJI_CMD --headless
          echo "✅ Fiji updater finished"

      - name: 📦 Upload Fiji artifact
        uses: actions/upload-artifact@v4
        with:
          name: fiji-${{ matrix.os }}
          path: Fiji.app-${{ env.PLATFORM }}

  release:
    needs: assemble-fiji
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: fiji-ubuntu-latest
          path: ./artifacts/linux
      - name: 📥 Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: fiji-windows-latest
          path: ./artifacts/windows
      - name: 🚀 Create Release and Upload Artifacts
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./artifacts/linux/*
            ./artifacts/windows/*
