name: IMCF Fiji Assembly 🏗️

on:
  push:
    branches: [main, ga_assembly]
  workflow_dispatch:

jobs:
  assemble-fiji:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🖥️ Set platform variable
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            echo "PLATFORM=win64" >> $GITHUB_ENV
            echo "FIJI_DIR=Fiji.app-windows" >> $GITHUB_ENV
            echo "PLATFORM_NAME=windows" >> $GITHUB_ENV
          else
            echo "PLATFORM=linux64" >> $GITHUB_ENV
            echo "FIJI_DIR=Fiji.app-linux" >> $GITHUB_ENV
            echo "PLATFORM_NAME=linux" >> $GITHUB_ENV
          fi
          echo "Platform set to $PLATFORM"

      - name: 🖼️ Install X11 libraries (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          # Install xvfb and the X11 libs ImageJ/Fiji needs
          sudo apt-get install -y xvfb libx11-6 libxext6 libxrender1 libxtst6 libxi6

      - name: 🏃‍♂️ Run the assembly script
        shell: bash
        run: |
          # Run with bash explicitly so this works on both Ubuntu and Windows (Git Bash is available on windows-latest)
          if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
            # Let the script detect and use xvfb-run / headless mode when needed
            bash manage/assemble-fresh-fiji-installation.sh manage/update-sites-all.json $PLATFORM
          else
            bash manage/assemble-fresh-fiji-installation.sh manage/update-sites-all.json $PLATFORM
          fi

      # - name: 📦 Zip Fiji folder (per-platform)
      #   shell: bash
      #   run: |
      #     set -euo pipefail
      #     # prefer the platform-specific directory created by the script
      #     DIR="Fiji.app-$PLATFORM"
      #     if [ ! -d "$DIR" ]; then
      #       # fall back to generic Fiji.app
      #       DIR="Fiji.app"
      #     fi
      #     ZIP_NAME="fiji-${{ matrix.os }}.zip"
      #     echo "Zipping $DIR -> $ZIP_NAME"
      #     zip -r "$ZIP_NAME" "$DIR"

      - name: 📤 Upload Fiji artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fiji.app-${{ env.PLATFORM_NAME }}
          path: ${{ env.FIJI_DIR }}

  release:
    needs: assemble-fiji
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: Fiji.app-linux
          path: ./artifacts/Fiji.app-linux

      - name: 📥 Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Fiji.app-windows
          path: ./artifacts/Fiji.app-windows

      - name: 📦 Create zip files and set release tag
        id: prepare_release
        run: |
          CURRENT_DATE=$(date +%Y-%m-%d)
          echo "RELEASE_TAG=v${CURRENT_DATE}" >> $GITHUB_OUTPUT
          echo "RELEASE_NAME=Fiji Assembly ${CURRENT_DATE}" >> $GITHUB_OUTPUT
          cd artifacts
          zip -r "Fiji.app-linux-${CURRENT_DATE}.zip" Fiji.app-linux
          zip -r "Fiji.app-windows-${CURRENT_DATE}.zip" Fiji.app-windows
          cd ..

      - name: 🔎 List downloaded artifacts
        run: |
          echo "Artifacts dir:"
          ls -lh ./artifacts || true

      - name: 🚀 Create Release and Upload Artifacts
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.prepare_release.outputs.RELEASE_TAG }}
          name: ${{ steps.prepare_release.outputs.RELEASE_NAME }}
          files: |
            ./artifacts/Fiji.app-linux-*.zip
            ./artifacts/Fiji.app-windows-*.zip
